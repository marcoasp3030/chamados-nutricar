services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: chamados-nutricar:latest
    container_name: chamados-app
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0
      STORAGE_DIR: /data/storage
      DATABASE_URL: postgres://app:${POSTGRES_PASSWORD}@db:5432/app
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - storage_data:/data/storage
    ports:
      - "127.0.0.1:3000:3000"
    networks:
      - app-net

  db:
    image: postgres:16-alpine
    container_name: chamados-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: app
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./scripts/db-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - app-net

  caddy:
    image: caddy:2-alpine
    container_name: chamados-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
    networks:
      - app-net

volumes:
  db_data:
  storage_data:
  caddy_data:
  caddy_config:

networks:
  app-net:
    driver: bridge
